apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: public-api
    henosis.dev/environment: dev
  name: public-api
  namespace: payments-api-dev
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: public-api
      henosis.dev/environment: dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: public-api
        henosis.dev/environment: dev
    spec:
      containers:
        - env:
            - name: ALPHA
              value: one
            - name: ZED
              value: "2"
          image: sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          name: public-api
          ports:
            - containerPort: 8080
              name: http
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  labels:
    app.kubernetes.io/name: public-api
    henosis.dev/environment: dev
  name: public-api
  namespace: payments-api-dev
spec:
  maxReplicas: 10
  metrics:
    - resource:
        name: cpu
        target:
          averageUtilization: 70
          type: Utilization
      type: Resource
  minReplicas: 3
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: public-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  labels:
    app.kubernetes.io/name: public-api
    henosis.dev/environment: dev
  name: public-api
  namespace: payments-api-dev
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: public-api
      henosis.dev/environment: dev
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    henosis.dev/environment: dev
  name: payments-api-dev
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/name: public-api
    henosis.dev/environment: dev
  name: public-api
  namespace: payments-api-dev
spec:
  ports:
    - name: http
      port: 8443
      protocol: TCP
      targetPort: 8080
  selector:
    app.kubernetes.io/name: public-api
    henosis.dev/environment: dev
  type: ClusterIP
